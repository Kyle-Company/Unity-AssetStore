<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="fi-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C9A23D"/>
      <stop offset="0.5" stop-color="#7FA63D"/>
      <stop offset="1" stop-color="#2F7B4C"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#fi-bg)"/>
  <g>
    <!-- tile helper look: rounded slots -->
    <g fill="#1B2A18" opacity="0.28">
      <rect x="70"  y="70"  width="120" height="110" rx="16"/>
      <rect x="240" y="70"  width="120" height="110" rx="16"/>
      <rect x="410" y="70"  width="120" height="110" rx="16"/>
      <rect x="70"  y="220" width="120" height="110" rx="16"/>
      <rect x="240" y="220" width="120" height="110" rx="16"/>
      <rect x="410" y="220" width="120" height="110" rx="16"/>
    </g>
    <g stroke="#FFF4D6" stroke-opacity="0.25" fill="none">
      <rect x="70"  y="70"  width="120" height="110" rx="16"/>
      <rect x="240" y="70"  width="120" height="110" rx="16"/>
      <rect x="410" y="70"  width="120" height="110" rx="16"/>
      <rect x="70"  y="220" width="120" height="110" rx="16"/>
      <rect x="240" y="220" width="120" height="110" rx="16"/>
      <rect x="410" y="220" width="120" height="110" rx="16"/>
    </g>
  </g>
  <!-- sword -->
  <g transform="translate(130 125)" stroke="#FFF4D6" stroke-width="3" fill="#EAF2C8">
    <path d="M0 -36 L7 -28 L7 18 L-7 18 L-7 -28 Z" stroke-linejoin="round"/>
    <rect x="-16" y="18" width="32" height="7" rx="3" fill="#C98A3D"/>
    <rect x="-4" y="25" width="8" height="16" fill="#C98A3D" stroke="none"/>
  </g>
  <!-- shield -->
  <g transform="translate(300 125)">
    <path d="M0 -34 L30 -22 L30 8 Q30 30 0 42 Q-30 30 -30 8 L-30 -22 Z" fill="#3FA0D9" stroke="#FFF4D6" stroke-width="3" stroke-linejoin="round"/>
    <path d="M0 -34 L0 42" stroke="#FFF4D6" stroke-width="2" opacity="0.7"/>
    <path d="M-30 -2 L30 -2" stroke="#FFF4D6" stroke-width="2" opacity="0.7"/>
  </g>
  <!-- potion -->
  <g transform="translate(470 125)">
    <rect x="-7" y="-34" width="14" height="14" rx="2" fill="#C98A3D" stroke="#FFF4D6" stroke-width="2"/>
    <path d="M-7 -22 L-7 -12 Q-26 -2 -22 18 Q-18 38 0 38 Q18 38 22 18 Q26 -2 7 -12 L7 -22 Z" fill="#E0556F" stroke="#FFF4D6" stroke-width="3" stroke-linejoin="round"/>
    <ellipse cx="-6" cy="6" rx="4" ry="7" fill="#FFD0DA" opacity="0.7"/>
  </g>
  <!-- coin -->
  <g transform="translate(130 275)">
    <circle r="34" fill="#FFD23D" stroke="#C98A3D" stroke-width="4"/>
    <circle r="24" fill="none" stroke="#C98A3D" stroke-width="2" opacity="0.7"/>
    <path d="M0 -14 L0 14 M-12 0 L12 0" stroke="#C98A3D" stroke-width="4"/>
  </g>
  <!-- gem -->
  <g transform="translate(300 275)">
    <polygon points="0,-32 26,-10 16,30 -16,30 -26,-10" fill="#7FD0FF" stroke="#FFF4D6" stroke-width="3" stroke-linejoin="round"/>
    <polygon points="0,-32 -26,-10 0,2 26,-10" fill="#BFE9FF"/>
    <path d="M-26 -10 L0 30 L26 -10" fill="none" stroke="#FFF4D6" stroke-width="2" opacity="0.6"/>
  </g>
  <!-- wand/staff -->
  <g transform="translate(470 275)">
    <rect x="-4" y="-6" width="8" height="42" rx="4" fill="#9B6BFF" stroke="#FFF4D6" stroke-width="2"/>
    <g transform="translate(0 -22)" fill="#FFD23D" stroke="#FFF4D6" stroke-width="2">
      <polygon points="0,-18 5,-5 18,0 5,5 0,18 -5,5 -18,0 -5,-5"/>
    </g>
  </g>
</svg>
