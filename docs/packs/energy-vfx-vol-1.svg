<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="ev-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#163A8C"/>
      <stop offset="0.55" stop-color="#3E4FB8"/>
      <stop offset="1" stop-color="#6A4FD8"/>
    </linearGradient>
    <radialGradient id="ev-core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.35" stop-color="#7FD0FF"/>
      <stop offset="0.7" stop-color="#34B7FF"/>
      <stop offset="1" stop-color="#34B7FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ev-bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#BFE9FF"/>
      <stop offset="1" stop-color="#9B6BFF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ev-bg)"/>
  <!-- glow core -->
  <circle cx="300" cy="200" r="170" fill="url(#ev-core)" opacity="0.9"/>
  <circle cx="300" cy="200" r="78" fill="url(#ev-core)"/>
  <!-- orbiting energy rings -->
  <g fill="none" stroke-linecap="round" opacity="0.85">
    <ellipse cx="300" cy="200" rx="150" ry="56" stroke="#7FD0FF" stroke-width="3" transform="rotate(-20 300 200)" opacity="0.6"/>
    <ellipse cx="300" cy="200" rx="150" ry="56" stroke="#9B6BFF" stroke-width="3" transform="rotate(35 300 200)" opacity="0.55"/>
  </g>
  <!-- lightning bolt -->
  <path d="M318 70 L250 200 L300 200 L274 330 L360 180 L308 180 Z" fill="url(#ev-bolt)" stroke="#FFFFFF" stroke-width="2" opacity="0.95"/>
  <!-- sparks -->
  <g fill="#BFE9FF">
    <circle cx="150" cy="120" r="4"/>
    <circle cx="470" cy="150" r="5"/>
    <circle cx="180" cy="300" r="3"/>
    <circle cx="440" cy="300" r="4"/>
    <circle cx="120" cy="220" r="3"/>
    <circle cx="500" cy="240" r="3"/>
  </g>
  <g stroke="#BFE9FF" stroke-width="2" opacity="0.5">
    <path d="M110 160 l16 -8"/>
    <path d="M490 110 l16 8"/>
    <path d="M130 320 l14 6"/>
  </g>
</svg>
