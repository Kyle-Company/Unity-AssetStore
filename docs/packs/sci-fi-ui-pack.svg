<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="su-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E3A3A"/>
      <stop offset="0.5" stop-color="#147A6E"/>
      <stop offset="1" stop-color="#1E4F8A"/>
    </linearGradient>
    <linearGradient id="su-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3FD98A"/>
      <stop offset="1" stop-color="#34B7FF"/>
    </linearGradient>
  </defs>
  <rect width="600" height="400" fill="url(#su-bg)"/>
  <!-- faint grid -->
  <g stroke="#7FE3FF" stroke-width="1" opacity="0.12">
    <path d="M0 80 H600 M0 160 H600 M0 240 H600 M0 320 H600"/>
    <path d="M100 0 V400 M200 0 V400 M300 0 V400 M400 0 V400 M500 0 V400"/>
  </g>
  <!-- HUD ring -->
  <g transform="translate(150 200)">
    <circle r="78" fill="none" stroke="#34B7FF" stroke-width="2" opacity="0.5"/>
    <circle r="78" fill="none" stroke="url(#su-line)" stroke-width="4" stroke-dasharray="120 370" stroke-linecap="round"/>
    <circle r="58" fill="none" stroke="#3FD98A" stroke-width="2" stroke-dasharray="6 10" opacity="0.7"/>
    <circle r="30" fill="none" stroke="#7FE3FF" stroke-width="2" opacity="0.6"/>
    <circle r="6" fill="#3FD98A"/>
  </g>
  <!-- right panel -->
  <g transform="translate(330 110)">
    <rect width="220" height="180" rx="10" fill="#0A2A2E" opacity="0.55" stroke="#34B7FF" stroke-opacity="0.4"/>
    <rect x="18" y="22" width="120" height="10" rx="5" fill="url(#su-line)"/>
    <rect x="18" y="44" width="184" height="6" rx="3" fill="#7FE3FF" opacity="0.35"/>
    <rect x="18" y="58" width="150" height="6" rx="3" fill="#7FE3FF" opacity="0.25"/>
    <!-- bars -->
    <rect x="18" y="92" width="22" height="60" rx="3" fill="#3FD98A" opacity="0.8"/>
    <rect x="50" y="110" width="22" height="42" rx="3" fill="#34B7FF" opacity="0.8"/>
    <rect x="82" y="78" width="22" height="74" rx="3" fill="#3FD98A" opacity="0.65"/>
    <rect x="114" y="100" width="22" height="52" rx="3" fill="#34B7FF" opacity="0.7"/>
    <rect x="150" y="120" width="52" height="32" rx="6" fill="none" stroke="#7FE3FF" stroke-opacity="0.6"/>
    <circle cx="176" cy="136" r="9" fill="#3FD98A"/>
  </g>
  <!-- corner brackets -->
  <g stroke="#7FE3FF" stroke-width="2" fill="none" opacity="0.6">
    <path d="M24 24 H56 M24 24 V56"/>
    <path d="M576 376 H544 M576 376 V344"/>
  </g>
</svg>
