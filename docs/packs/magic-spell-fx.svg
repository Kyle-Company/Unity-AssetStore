<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <linearGradient id="ms-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C97A3D"/>
      <stop offset="0.5" stop-color="#6E6E7A"/>
      <stop offset="1" stop-color="#2E6FA6"/>
    </linearGradient>
    <radialGradient id="ms-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFE7B3"/>
      <stop offset="0.4" stop-color="#FFA63D"/>
      <stop offset="0.8" stop-color="#34B7FF" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#34B7FF" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="400" fill="url(#ms-bg)"/>
  <!-- magic circle glow -->
  <circle cx="300" cy="210" r="160" fill="url(#ms-glow)" opacity="0.8"/>
  <!-- runic circles -->
  <g transform="translate(300 210)" fill="none" stroke="#FFE7B3" stroke-linecap="round">
    <circle r="120" stroke-width="2" opacity="0.55" stroke-dasharray="4 14"/>
    <circle r="100" stroke-width="3" opacity="0.7"/>
    <circle r="72" stroke-width="2" opacity="0.5" stroke-dasharray="20 12"/>
    <!-- inscribed triangles -->
    <polygon points="0,-92 80,46 -80,46" stroke="#7FD0FF" stroke-width="2" opacity="0.7"/>
    <polygon points="0,92 80,-46 -80,-46" stroke="#34B7FF" stroke-width="2" opacity="0.6"/>
    <circle r="30" stroke-width="2" opacity="0.8"/>
  </g>
  <!-- swirling particles -->
  <g fill="#FFE7B3">
    <circle cx="300" cy="210" r="10" fill="#FFFFFF"/>
    <circle cx="180" cy="120" r="5"/>
    <circle cx="430" cy="140" r="6"/>
    <circle cx="150" cy="280" r="4"/>
    <circle cx="455" cy="290" r="5"/>
    <circle cx="240" cy="70"  r="3"/>
    <circle cx="370" cy="340" r="4"/>
  </g>
  <g fill="#7FD0FF">
    <circle cx="210" cy="330" r="4"/>
    <circle cx="400" cy="80"  r="3"/>
    <circle cx="110" cy="190" r="4"/>
    <circle cx="500" cy="200" r="4"/>
  </g>
  <!-- motion sparks -->
  <g stroke="#FFFFFF" stroke-width="2" opacity="0.7" fill="none">
    <path d="M300 210 q60 -70 130 -60"/>
    <path d="M300 210 q-70 50 -120 110"/>
    <path d="M300 210 q70 60 60 130"/>
  </g>
</svg>
